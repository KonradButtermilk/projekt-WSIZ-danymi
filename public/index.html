<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LinguaLearn — Your personal language learning platform. Browse courses, complete lessons, and track your progress.">
  <title>LinguaLearn — Language Learning Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav id="navbar" class="navbar hidden">
    <div class="nav-brand" style="cursor: pointer;" id="nav-brand-logo">
      <span class="nav-logo">📖</span>
      <span class="nav-title">LinguaLearn</span>
    </div>
    <div class="nav-links">
      <a href="#" data-page="dashboard" class="nav-link active" id="nav-dashboard" data-i18n="nav.dashboard">Dashboard</a>
      <a href="#" data-page="vocabulary" class="nav-link" id="nav-vocabulary" data-i18n="nav.vocabulary">Vocabulary</a>
      <a href="#" data-page="leaderboard" class="nav-link" id="nav-leaderboard" data-i18n="nav.leaderboard">Leaderboard</a>
    </div>
    <div class="nav-user">
      <button id="btn-theme-toggle" class="btn btn-sm btn-outline" style="border:none; font-size:1.2rem;">🌙</button>
      <button id="btn-lang-toggle" class="btn btn-sm btn-outline">🇵🇱 PL</button>
      <button id="btn-upgrade-pro" class="btn btn-sm btn-primary" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); color: #333; border: none; font-weight: bold; display: none;">⭐ Upgrade to Pro</button>
      <span id="nav-pro-badge" class="nav-stat" style="display: none; font-weight: bold; color: #ff9a9e;">⭐ PRO</span>
      <span id="nav-xp" class="nav-stat">0 XP</span>
      <span id="nav-streak" class="nav-stat">🔥 0</span>
      <span id="nav-username" class="nav-username">User</span>
      <button id="btn-logout" class="btn btn-sm btn-outline" data-i18n="nav.logout">Log out</button>
    </div>
  </nav>

  <!-- Main content container -->
  <main id="app-content">
    <!-- Views will be injected here -->
  </main>

  <!-- Toast notification container -->
  <div id="toast-container"></div>

  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/course.js"></script>
  <script src="/js/quiz.js"></script>
  <script src="/js/flashcards.js"></script>
  <script src="/js/leaderboard.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
